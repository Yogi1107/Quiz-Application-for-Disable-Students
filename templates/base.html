<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Accessible Quiz Platform{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* Skip link — visually hidden until focused */
        .skip-link {
            position: absolute;
            top: -9999px;
            left: -9999px;
            z-index: 9999;
            padding: 0.75rem 1.25rem;
            background: #000;
            color: #fff;
            font-weight: 600;
            border-radius: 0 0 4px 4px;
            text-decoration: none;
        }
        .skip-link:focus {
            top: 0;
            left: 0;
        }

        /* Ensure focus rings are always visible */
        :focus-visible {
            outline: 3px solid #ffc107;
            outline-offset: 3px;
        }

        /* Live region for dynamic announcements */
        #live-region {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
            white-space: nowrap;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<!--
    The `lang` attribute on <html> is critical: screen readers use it
    to select the correct speech synthesiser voice and pronunciation rules.
-->
<body>

    <!-- ① Skip navigation link ─────────────────────────────────────────────
         The very first focusable element on every page. Allows keyboard and
         screen-reader users to jump past the repeated nav directly to the
         main content, avoiding having to tab through every nav link on every
         page load. WCAG 2.4.1 (Bypass Blocks) — Level A.
    -->
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <!-- ② ARIA Live Region ─────────────────────────────────────────────────
         Inject short dynamic status messages here (e.g. "Quiz submitted",
         "Time remaining: 2 minutes") via JS and screen readers will announce
         them without moving keyboard focus. Use role="status" (polite) for
         non-urgent messages and role="alert" (assertive) for urgent ones.
    -->
    <div id="live-region" role="status" aria-live="polite" aria-atomic="true"></div>

    <!-- ③ Navigation ───────────────────────────────────────────────────────
         • role="navigation" is implicit on <nav>, but aria-label distinguishes
           this landmark from any secondary <nav> elements on the page (e.g. a
           breadcrumb or in-page TOC).
         • The hamburger toggle gets aria-expanded + aria-controls so screen
           readers know the button controls a collapsible region and whether it
           is currently open.
         • All decorative Font Awesome icons get aria-hidden="true" so they are
           skipped by screen readers; the adjacent visible text provides the
           label instead. Where an icon carries meaning with NO adjacent text,
           add a visually-hidden <span class="visually-hidden"> label instead.
    -->
    {% if session.user_id %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary"
         aria-label="Primary navigation">
        <div class="container">

            <a class="navbar-brand"
               href="{{ url_for('main.dashboard') }}"
               aria-label="Quiz Platform — go to dashboard">
                <i class="fas fa-graduation-cap" aria-hidden="true"></i>
                <span>Quiz Platform</span>
            </a>

            <!--
                aria-expanded reflects the open/closed state of the mobile menu.
                JS (or Bootstrap) should keep this in sync when the menu toggles.
                aria-controls points to the id of the collapsible panel.
            -->
            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                    aria-controls="navbarNav"
                    aria-expanded="false"
                    aria-label="Toggle navigation menu">
                <span class="navbar-toggler-icon" aria-hidden="true"></span>
            </button>

            <!--
                The collapsible panel itself needs an id that matches
                aria-controls above, plus role="navigation" is already
                inherited from the parent <nav>.
            -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <!--
                    Use a <ul> / <li> structure (already present) because it
                    conveys list semantics — screen readers announce
                    "list, X items" which helps users gauge how many links to
                    expect before reaching the end of the nav.
                -->
                <ul class="navbar-nav ms-auto" role="list">

                    <!-- User identity — purely informational, not interactive -->
                    <li class="nav-item" role="listitem">
                        <span class="navbar-text me-3">
                            <!--
                                The badge communicates role (STUDENT / TEACHER).
                                We expose this to screen readers with an
                                aria-label on the wrapping <span> so the
                                announcement is "Role: STUDENT, Alice" rather
                                than a confusing "STUDENT Alice".
                            -->
                            <span aria-label="Role: {{ session.role|upper }}"
                                  class="badge bg-light text-primary">
                                {{ session.role|upper }}
                            </span>
                            <!--
                                Visually hidden text gives context for the
                                plain username that follows.
                            -->
                            <span class="visually-hidden">Logged in as</span>
                            {{ session.username }}
                        </span>
                    </li>

                    <!-- Logout link -->
                    <li class="nav-item" role="listitem">
                        <a class="nav-link"
                           href="{{ url_for('main.logout') }}"
                           aria-label="Logout from Quiz Platform">
                            <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
                            <span>Logout</span>
                        </a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    {% endif %}

    <!-- ④ Main Content ─────────────────────────────────────────────────────
         • id="main-content" is the skip-link target (href="#main-content").
         • role="main" is implicit on <main> but kept explicit for older
           assistive technologies that don't recognise the HTML5 element.
         • tabindex="-1" allows the element to receive programmatic focus
           (e.g. when the skip link is activated) without placing it in the
           natural tab order.
    -->
    <main id="main-content"
          role="main"
          tabindex="-1"
          aria-label="Main content">
        {% block content %}{% endblock %}
    </main>

    <!-- ⑤ Toast / Notification Region ─────────────────────────────────────
         • role="region" + aria-label makes this a named landmark so power
           users can jump to it via landmark navigation (e.g. NVDA's R key).
         • The inner toast uses role="alert" (assertive) because notifications
           typically need immediate attention. If the toasts are informational
           rather than urgent, switch to role="status" / aria-live="polite".
         • aria-atomic="true" ensures the entire toast text is re-read whenever
           it updates, not just the changed portion.
         • aria-live="assertive" on the container means newly injected toasts
           are announced without requiring focus.
    -->
    <div class="toast-container position-fixed top-0 end-0 p-3"
         role="region"
         aria-label="Notifications"
         aria-live="assertive"
         aria-atomic="true">

        <div id="notificationToast"
             class="toast"
             role="alert"
             aria-live="assertive"
             aria-atomic="true">

            <div class="toast-header">
                <i class="fas fa-info-circle me-2" aria-hidden="true"></i>
                <strong class="me-auto" id="toastTitle">Notification</strong>

                <!--
                    The close button must have a clear accessible name.
                    Bootstrap's .btn-close renders as an empty <button>;
                    aria-label fills the gap so screen readers announce
                    "Close notification, button" rather than just "button".
                    aria-describedby ties the button to the toast title so
                    context is preserved in the accessibility tree.
                -->
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="toast"
                        aria-label="Close notification"
                        aria-describedby="toastTitle">
                </button>
            </div>

            <!-- The message body; id used by aria-describedby on the button -->
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!--
        ⑥ Inline accessibility helpers ─────────────────────────────────────
        Keep aria-expanded on the navbar toggle in sync as Bootstrap toggles
        the menu, and expose toast messages to the live region so assistive
        technologies announce them even when the user's focus is elsewhere.
    -->
    <script>
        // --- Navbar toggle: sync aria-expanded --------------------------------
        const navbarToggler = document.querySelector('.navbar-toggler');
        const navbarCollapse = document.getElementById('navbarNav');

        if (navbarCollapse) {
            navbarCollapse.addEventListener('show.bs.collapse', () => {
                navbarToggler?.setAttribute('aria-expanded', 'true');
            });
            navbarCollapse.addEventListener('hide.bs.collapse', () => {
                navbarToggler?.setAttribute('aria-expanded', 'false');
            });
        }

        // --- Toast: mirror message to the polite live region ------------------
        // Call window.announceToUser('Your message') anywhere in the app to
        // push a screen-reader announcement without moving keyboard focus.
        const liveRegion = document.getElementById('live-region');

        window.announceToUser = function(message) {
            if (!liveRegion) return;
            // Clear first so identical consecutive messages still trigger a
            // fresh announcement (some SRs ignore unchanged live region text).
            liveRegion.textContent = '';
            requestAnimationFrame(() => {
                liveRegion.textContent = message;
            });
        };

        // Mirror Bootstrap toast content to the live region automatically.
        const toastEl = document.getElementById('notificationToast');
        if (toastEl) {
            toastEl.addEventListener('show.bs.toast', () => {
                const body = document.getElementById('toastBody')?.textContent?.trim();
                if (body) window.announceToUser(body);
            });
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
